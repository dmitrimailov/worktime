version: "1.0.1"
build_number: 1
android:
  package_name: "com.dmitrimailov.worktimer" # Придумай один раз и не меняй
  permissions:
    - INTERNET
requires:
  - requests
  - packaging

manifest:
  # Жестко фиксируем ID приложения, чтобы Android всегда распознавал его
  # и корректно обновлял, не удаляя данные.
  application-id: com.dmitrimailov.worktimer
  uses-permission:
    - android.permission.INTERNET
    - android.permission.REQUEST_INSTALL_PACKAGES
